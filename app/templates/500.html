<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>500 – Server Error | DTS Unisan</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    body { background:#F0EDE8; font-family:'IBM Plex Sans',sans-serif; display:flex; align-items:center; justify-content:center; min-height:100vh; }
    .err-card { background:white; border-radius:12px; padding:48px 40px; text-align:center; max-width:440px; box-shadow:0 2px 16px rgba(0,0,0,.08); }
    .err-icon { font-size:48px; color:#b71c1c; margin-bottom:16px; }
    .err-code { font-size:64px; font-weight:800; color:#b71c1c; line-height:1; }
    .err-msg  { font-size:16px; color:#5C5248; margin:12px 0 24px; }
  </style>
</head>
<body>
  <div class="err-card">
    <div class="err-icon"><i class="fa fa-circle-exclamation"></i></div>
    <div class="err-code">500</div>
    <div class="err-msg">Something went wrong on our end.<br>The error has been logged. Please try again.</div>
    <a href="/" class="btn btn-danger px-4">Go to Home</a>
  </div>
</body>
</html>
