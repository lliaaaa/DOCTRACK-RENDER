<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
    min-height: 100vh;
    background: linear-gradient(160deg, #6B0000 0%, #a01010 50%, #6B0000 100%);
    display: flex; align-items: center; justify-content: center;
    font-family: 'IBM Plex Sans', 'Arial', sans-serif;
    padding: 20px;
}
.wrap { width: 100%; max-width: 420px; }
.card {
    background: white; border-radius: 14px; padding: 36px 32px;
    box-shadow: 0 8px 40px rgba(0,0,0,.35);
}
.icon-ring {
    width: 64px; height: 64px; border-radius: 50%;
    background: #fff3cd; border: 2px solid #ffc107;
    display: flex; align-items: center; justify-content: center;
    font-size: 28px; margin: 0 auto 18px;
}
h2 { font-size: 20px; font-weight: 700; color: #1a1a2e; text-align: center; margin-bottom: 6px; }
.subtitle { text-align: center; font-size: 13px; color: #6c757d; margin-bottom: 24px; line-height: 1.5; }
label { font-size: 13px; font-weight: 600; color: #374151; display: block; margin-bottom: 5px; }
input[type=password] {
    width: 100%; padding: 10px 13px; border: 1.5px solid #d1d5db;
    border-radius: 8px; font-size: 14px; outline: none;
    transition: border-color .2s;
}
input[type=password]:focus { border-color: #c0392b; }
.form-group { margin-bottom: 16px; }
.hint { font-size: 11px; color: #9ca3af; margin-top: 4px; }
.btn-submit {
    width: 100%; padding: 12px; background: #c0392b; color: white;
    border: none; border-radius: 8px; font-size: 15px; font-weight: 600;
    cursor: pointer; margin-top: 8px; transition: background .2s;
}
.btn-submit:hover { background: #a93226; }
.alert {
    padding: 10px 14px; border-radius: 8px; font-size: 13px;
    margin-bottom: 16px;
}
.alert-warning { background: #fff3cd; color: #856404; border: 1px solid #ffc107; }
.alert-danger  { background: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
</style>

<div class="wrap">
  <div class="card">
    <div class="icon-ring">🔑</div>
    <h2>Change Your Password</h2>
    <p class="subtitle">Your account was set up with a temporary password.<br>Please create a new one to continue.</p>

    {% with messages = get_flashed_messages(with_categories=true) %}
      {% for category, message in messages %}
        <div class="alert alert-{{ 'danger' if category == 'danger' else 'warning' }}">{{ message }}</div>
      {% endfor %}
    {% endwith %}

    <form method="POST" action="{{ url_for('auth.force_change_password') }}">
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
      <div class="form-group">
        <label>New Password</label>
        <input type="password" name="new_password" required minlength="6" autofocus>
        <p class="hint">Minimum 6 characters</p>
      </div>
      <div class="form-group">
        <label>Confirm New Password</label>
        <input type="password" name="confirm_password" required minlength="6">
      </div>
      <button type="submit" class="btn-submit">Set New Password</button>
    </form>
  </div>
</div>
