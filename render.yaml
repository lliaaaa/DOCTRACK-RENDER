services:
  # ── Main Web App ───────────────────────────────────────────────────────────
  - type: web
    name: doctrack-system
    env: python
    buildCommand: "./build.sh"
    startCommand: "gunicorn -c gunicorn.conf.py run:app"
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: doctrack-db
          property: connectionString
      - key: FLASK_DEBUG
        value: false
      - key: FLASK_ENV
        value: production

  # ── Daily DB Backup Cron Job ───────────────────────────────────────────────
  # Runs backup.py every day at 2:00 AM (UTC).
  # Saves pg_dump .sql files to /backups, keeps last 10.
  # Note: Cron jobs require a paid Render plan ($1/month).
  # Free alternative: enable Render's built-in PostgreSQL backups in the
  # database dashboard (Databases → doctrack-db → Backups tab).
  - type: cron
    name: doctrack-backup
    env: python
    schedule: "0 2 * * *"
    buildCommand: "pip install -r requirements.txt"
    startCommand: "python backup.py"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: doctrack-db
          property: connectionString

databases:
  # ── PostgreSQL (free tier) ─────────────────────────────────────────────────
  - name: doctrack-db
    databaseName: doctrack
    user: doctrack_user
    plan: free
