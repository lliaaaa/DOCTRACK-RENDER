services:
  - type: web
    name: doctrack-system
    env: python
    buildCommand: "./build.sh"
    startCommand: "python -m flask --app run db upgrade && gunicorn -c gunicorn.conf.py run:app"
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: doctrack-db
          property: connectionString
      - key: FLASK_DEBUG
        value: false

databases:
  - name: doctrack-db
    databaseName: doctrack
    user: doctrack_user
    plan: free